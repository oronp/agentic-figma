<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cursor MCP Plugin</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 20px;
        color: #e0e0e0;
        background-color: #1e1e1e;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 10px;
        color: #ffffff;
      }

      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-top: 20px;
        margin-bottom: 8px;
        color: #ffffff;
      }

      button {
        background-color: #18a0fb;
        border: none;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        margin-top: 8px;
        margin-bottom: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #0d8ee0;
      }

      button.secondary {
        background-color: #3d3d3d;
        color: #e0e0e0;
      }

      button.secondary:hover {
        background-color: #4d4d4d;
      }

      button:disabled {
        background-color: #333333;
        color: #666666;
        cursor: not-allowed;
      }

      input {
        border: 1px solid #444444;
        border-radius: 4px;
        padding: 8px;
        margin-bottom: 12px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
        background-color: #2d2d2d;
        color: #e0e0e0;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        font-weight: 500;
        color: #cccccc;
      }

      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 6px;
        font-size: 14px;
      }

      .status.connected {
        background-color: #1a472a;
        color: #4ade80;
      }

      .status.disconnected {
        background-color: #471a1a;
        color: #ff9999;
      }

      .status.info {
        background-color: #1a3147;
        color: #66b3ff;
      }

      .toggle-container {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
      }

      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
        margin-right: 8px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
        margin: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #444444;
        transition: 0.4s;
        border-radius: 20px;
      }

      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .toggle-slider {
        background-color: #18a0fb;
      }

      input:checked + .toggle-slider:before {
        transform: translateX(20px);
      }

      .section {
        margin-bottom: 24px;
      }

      .hidden {
        display: none;
      }

      .logo {
        width: 50px;
        height: 50px;
      }

      .header {
        display: flex;
        align-items: center;
        margin-bottom: 16px;
      }

      .header-text {
        margin-left: 12px;
      }

      .header-text h1 {
        margin: 0;
        font-size: 16px;
      }

      .header-text p {
        margin: 4px 0 0 0;
        font-size: 12px;
        color: #999999;
      }

      .link {
        color: #18a0fb;
        text-decoration: none;
        cursor: pointer;
      }

      .link:hover {
        text-decoration: underline;
      }

      .header-logo {
        padding: 16px;
        border-radius: 16px;
        background-color: #333;
      }

      .header-logo-image {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }
      .channel-box {
        flex: 1;
        background-color: #2d2d2d;
        border: 1px solid #444444;
        border-radius: 4px;
        padding: 6px 10px;
        font-family: monospace;
        font-size: 13px;
        color: #e0e0e0;
        letter-spacing: 0.05em;
      }

      .icon-btn {
        background: none;
        border: 1px solid #444444;
        border-radius: 4px;
        padding: 6px 8px;
        margin: 0;
        cursor: pointer;
        color: #999999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s, border-color 0.2s;
      }

      .icon-btn:hover {
        color: #e0e0e0;
        border-color: #666666;
        background: none;
      }

      .toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #333333;
        color: #e0e0e0;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.3s;
        z-index: 100;
      }

      .toast.hidden {
        opacity: 0;
      }

      /* Progress styles */
      .operation-complete {
        color: #4ade80;
      }
      .operation-error {
        color: #ff9999;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <div class="header-text">
          <h1>Talk To Figma MCP Plugin</h1>
        </div>
      </div>

      <div id="content-connection">
        <div class="section">
          <div style="margin-bottom: 16px">
            <button id="btn-connect" class="primary" style="width: 100%">
              Connect
            </button>
          </div>
        </div>

        <div id="connection-status" class="status disconnected">
          Not connected to MCP server
        </div>

        <div id="channel-container" class="hidden" style="margin-top: 12px;">
          <label>Channel</label>
          <div style="display: flex; align-items: center; gap: 8px;">
            <div id="channel-display" class="channel-box"></div>
            <button id="btn-copy-channel" class="icon-btn" title="Copy channel">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>

        <div id="toast" class="toast hidden">Copied!</div>

        <div class="section">
          <div id="port-container">
            <label for="port">WebSocket Server Port</label>
            <input
              type="number"
              id="port"
              placeholder="3055"
              value="3055"
              min="1024"
              max="65535"
            />
          </div>
        </div>

        <!-- Add Progress Bar Section -->
        <div id="progress-container" class="section hidden">
          <h2>Operation Progress</h2>
          <div id="progress-message">No operation in progress</div>
          <div
            style="
              width: 100%;
              background-color: #444;
              border-radius: 4px;
              margin-top: 8px;
            "
          >
            <div
              id="progress-bar"
              style="
                width: 0%;
                height: 8px;
                background-color: #18a0fb;
                border-radius: 4px;
                transition: width 0.3s;
              "
            ></div>
          </div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-top: 4px;
              font-size: 12px;
            "
          >
            <div id="progress-status">Not started</div>
            <div id="progress-percentage">0%</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // WebSocket connection state
      const state = {
        connected: false,
        socket: null,
        serverPort: 3055,
        pendingRequests: new Map(),
        channel: null,
      };

      // UI Elements
      const portInput = document.getElementById("port");
      const connectButton = document.getElementById("btn-connect");
      const connectionStatus = document.getElementById("connection-status");
      const channelContainer = document.getElementById("channel-container");
      const channelDisplay = document.getElementById("channel-display");

      // Add UI elements for progress tracking
      const progressContainer = document.getElementById("progress-container");
      const progressBar = document.getElementById("progress-bar");
      const progressMessage = document.getElementById("progress-message");
      const progressStatus = document.getElementById("progress-status");
      const progressPercentage = document.getElementById("progress-percentage");

      // Initialize UI
      function updateConnectionStatus(isConnected, message) {
        state.connected = isConnected;

        let statusMessage =
          message ||
          (isConnected
            ? "Connected to MCP server"
            : "Not connected to MCP server");

        connectionStatus.innerHTML = statusMessage;
        connectionStatus.className = `status ${
          isConnected ? "connected" : "disconnected"
        }`;

        // Update connect button text and style based on connection state
        connectButton.textContent = isConnected ? "Disconnect" : "Connect";
        connectButton.className = isConnected ? "secondary" : "primary";
        portInput.disabled = isConnected;

        // Show/hide channel display
        if (isConnected && state.channel) {
          channelDisplay.textContent = state.channel;
          channelContainer.classList.remove("hidden");
        } else {
          channelContainer.classList.add("hidden");
        }
      }

      // Toast helper
      let toastTimer = null;
      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.remove("hidden");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.add("hidden"), 2000);
      }

      document.getElementById("btn-copy-channel").addEventListener("click", () => {
        if (!state.channel) return;
        const tmp = document.createElement("input");
        tmp.value = state.channel;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand("copy");
        document.body.removeChild(tmp);
        showToast("Copied!");
      });

      // Connect to WebSocket server
      async function connectToServer(port) {
        try {
          if (state.connected && state.socket) {
            updateConnectionStatus(true, "Already connected to server");
            return;
          }

          state.serverPort = port;
          const wsUrl = `ws://localhost:${port}`;

          state.socket = new WebSocket(wsUrl);

          state.socket.onopen = () => {
            // Generate random channel name
            const channelName = generateChannelName();
            console.log("Joining channel:", channelName);
            state.channel = channelName;

            // Join the channel using the same format as App.tsx
            state.socket.send(
              JSON.stringify({
                type: "join",
                channel: channelName.trim(),
              })
            );
          };

          state.socket.onmessage = (event) => {
            try {
              const data = JSON.parse(event.data);
              console.log("Received message:", data);

              if (data.type === "system") {
                // Successfully joined channel
                if (data.message && data.message.result) {
                  state.connected = true;
                  const channelName = data.channel;
                  updateConnectionStatus(true, "Connected to MCP server");

                  // Notify the plugin code
                  parent.postMessage(
                    {
                      pluginMessage: {
                        type: "notify",
                        message: `Connected to MCP server on port ${port} in channel: ${channelName}`,
                      },
                    },
                    "*"
                  );
                }
              } else if (data.type === "error") {
                console.error("Error:", data.message);
                updateConnectionStatus(false, `Error: ${data.message}`);
                state.socket.close();
              }

              handleSocketMessage(data);
            } catch (error) {
              console.error("Error parsing message:", error);
            }
          };

          state.socket.onclose = () => {
            state.connected = false;
            state.socket = null;
            updateConnectionStatus(false, "Disconnected from server");
          };

          state.socket.onerror = (error) => {
            console.error("WebSocket error:", error);
            updateConnectionStatus(false, "Connection error");
            state.connected = false;
            state.socket = null;
          };
        } catch (error) {
          console.error("Connection error:", error);
          updateConnectionStatus(
            false,
            `Connection error: ${error.message || "Unknown error"}`
          );
        }
      }

      // Disconnect from websocket server
      function disconnectFromServer() {
        if (state.socket) {
          state.socket.close();
          state.socket = null;
          state.connected = false;
          updateConnectionStatus(false, "Disconnected from server");
        }
      }

      // Handle messages from the WebSocket
      async function handleSocketMessage(payload) {
        const data = payload.message;
        console.log("handleSocketMessage", data);

        // If it's a response to a previous request
        if (data.id && state.pendingRequests.has(data.id)) {
          const { resolve, reject } = state.pendingRequests.get(data.id);
          state.pendingRequests.delete(data.id);

          if (data.error) {
            reject(new Error(data.error));
          } else {
            resolve(data.result);
          }
          return;
        }

        // If it's a new command
        if (data.command) {
          try {
            // Send the command to the plugin code
            parent.postMessage(
              {
                pluginMessage: {
                  type: "execute-command",
                  id: data.id,
                  command: data.command,
                  params: data.params,
                },
              },
              "*"
            );
          } catch (error) {
            // Send error back to WebSocket
            sendErrorResponse(
              data.id,
              error.message || "Error executing command"
            );
          }
        }
      }

      // Send a command to the WebSocket server
      async function sendCommand(command, params) {
        return new Promise((resolve, reject) => {
          if (!state.connected || !state.socket) {
            reject(new Error("Not connected to server"));
            return;
          }

          const id = generateId();
          state.pendingRequests.set(id, { resolve, reject });

          state.socket.send(
            JSON.stringify({
              id,
              type: "message",
              channel: state.channel,
              message: {
                id,
                command,
                params,
              },
            })
          );

          // Set timeout to reject the promise after 30 seconds
          setTimeout(() => {
            if (state.pendingRequests.has(id)) {
              state.pendingRequests.delete(id);
              reject(new Error("Request timed out"));
            }
          }, 30000);
        });
      }

      // Send success response back to WebSocket
      function sendSuccessResponse(id, result) {
        if (!state.connected || !state.socket) {
          console.error("Cannot send response: socket not connected");
          return;
        }

        state.socket.send(
          JSON.stringify({
            id,
            type: "message",
            channel: state.channel,
            message: {
              id,
              result,
            },
          })
        );
      }

      // Send error response back to WebSocket
      function sendErrorResponse(id, errorMessage) {
        if (!state.connected || !state.socket) {
          console.error("Cannot send error response: socket not connected");
          return;
        }

        state.socket.send(
          JSON.stringify({
            id,
            type: "message",
            channel: state.channel,
            message: {
              id,
              error: errorMessage,
              result: {},
            },
          })
        );
      }

      // Helper to generate unique IDs
      function generateId() {
        return (
          Date.now().toString(36) + Math.random().toString(36).substr(2, 5)
        );
      }

      // Add this function after the generateId() function
      function generateChannelName() {
        const characters = "abcdefghijklmnopqrstuvwxyz0123456789";
        let result = "";
        for (let i = 0; i < 8; i++) {
          result += characters.charAt(
            Math.floor(Math.random() * characters.length)
          );
        }
        return result;
      }

      // Replace the separate connect/disconnect button listeners with a single toggle
      connectButton.addEventListener("click", () => {
        if (state.connected) {
          updateConnectionStatus(false, "Disconnecting...");
          connectionStatus.className = "status info";
          disconnectFromServer();
        } else {
          const port = parseInt(portInput.value, 10) || 3055;
          updateConnectionStatus(false, "Connecting...");
          connectionStatus.className = "status info";
          connectToServer(port);
        }
      });

      // Function to update progress UI
      function updateProgressUI(progressData) {
        // Show progress container if hidden
        progressContainer.classList.remove("hidden");

        // Update progress bar
        const progress = progressData.progress || 0;
        progressBar.style.width = `${progress}%`;
        progressPercentage.textContent = `${progress}%`;

        // Update message
        progressMessage.textContent =
          progressData.message || "Operation in progress";

        // Update status text based on operation state
        if (progressData.status === "started") {
          progressStatus.textContent = "Started";
          progressStatus.className = "";
        } else if (progressData.status === "in_progress") {
          progressStatus.textContent = "In Progress";
          progressStatus.className = "";
        } else if (progressData.status === "completed") {
          progressStatus.textContent = "Completed";
          progressStatus.className = "operation-complete";

          // Hide progress container after 5 seconds
          setTimeout(() => {
            progressContainer.classList.add("hidden");
          }, 5000);
        } else if (progressData.status === "error") {
          progressStatus.textContent = "Error";
          progressStatus.className = "operation-error";
        }
      }

      // Send operation progress update to server
      function sendProgressUpdateToServer(progressData) {
        if (!state.connected || !state.socket) {
          console.error("Cannot send progress update: socket not connected");
          return;
        }

        console.log("Sending progress update to server:", progressData);

        state.socket.send(
          JSON.stringify({
            id: progressData.commandId,
            type: "progress_update",
            channel: state.channel,
            message: {
              id: progressData.commandId,
              type: "progress_update",
              data: progressData,
            },
          })
        );
      }

      // Reset progress UI
      function resetProgressUI() {
        progressContainer.classList.add("hidden");
        progressBar.style.width = "0%";
        progressMessage.textContent = "No operation in progress";
        progressStatus.textContent = "Not started";
        progressStatus.className = "";
        progressPercentage.textContent = "0%";
      }

      // Listen for messages from the plugin code
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        console.log("Received message from plugin:", message);

        switch (message.type) {
          case "connection-status":
            updateConnectionStatus(message.connected, message.message);
            break;
          case "auto-connect":
            connectButton.click();
            break;
          case "auto-disconnect":
            connectButton.click();
            break;
          case "command-result":
            // Forward the result from plugin code back to WebSocket
            sendSuccessResponse(message.id, message.result);
            break;
          case "command-error":
            // Forward the error from plugin code back to WebSocket
            sendErrorResponse(message.id, message.error);
            break;
          case "command_progress":
            // Update UI with progress information
            updateProgressUI(message);
            // Forward progress update to server
            sendProgressUpdateToServer(message);
            break;
        }
      };

    </script>
  </body>
</html>
